<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Livros Vintage</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Cadastrar Novo Livro</h1>
        <form id="form-livro">
            <div class="input-group">
                <label for="titulo">Título do Livro</label>
                <input type="text" id="titulo" required placeholder="Ex: O Hobbit">
            </div>
            
            <div class="input-group">
                <label for="autor">Autor</label>
                <input type="text" id="autor" required placeholder="Ex: J.R.R. Tolkien">
            </div>

            <div class="input-group">
                <label for="ano">Ano de Publicação</label>
                <input type="number" id="ano" required placeholder="Ex: 1937">
            </div>

            <button type="submit" id="btn-salvar">Salvar no Acervo</button>
        </form>
        <p id="mensagem-sucesso" class="escondido">Livro cadastrado com sucesso!</p>
    </div>

    <script type="module" src="{{ url_for('static', filename='core/firebase.js') }}"></script>
</body>
</html>
